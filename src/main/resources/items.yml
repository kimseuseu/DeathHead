# ═══════════════════════════════════
#  DeathHead 아이템 설정
#  '&' 색상 코드 사용 가능
# ═══════════════════════════════════

# 머리 열쇠
key:
  material: TRIPWIRE_HOOK
  name: "&6머리 열쇠"
  lore:
    - "&7사망한 플레이어의 머리에 사용하면"
    - "&7봉인된 아이템을 회수할 수 있습니다."
  custom-model-data: 0         # 0이면 사용 안 함

# 사망 방지권
protection-ticket:
  material: PAPER
  name: "&b사망 패널티 방지권"
  lore:
    - ""
    - "&7사망 시 자동으로 사용되어"
    - "&7아이템 유실을 방지합니다."
    - ""
    - "&8소모품 — 사망 시 1개 소모"

# 봉인된 머리 lore 템플릿
sealed-head:
  # {count} = 봉인된 아이템 수, {items} = 아이템 목록 (자동 생성)
  # {remaining} = 남은 시간 (자동 계산)
  max-display-items: 6         # lore에 표시할 최대 아이템 수
