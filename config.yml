#  Author: moo_gi
# ═══════════════════════════════════

# 사망 패널티 (인벤토리에서 제거할 비율)
penalty:
  min-percent: 10
  max-percent: 15

# 머리 관리
head:
  ttl-minutes: 60              # 사망 시점부터의 부패 시간 (분)
  death-cooldown: 10           # 연속 사망 쿨다운 (초)
  cleanup-interval: 60         # 부패 스캔 주기 (초)

# 엔티티 보호
entity-protection:
  scoreboard-tag: "deathhead"
