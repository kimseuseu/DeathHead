# ═══════════════════════════════════
#  DeathHead 메시지 설정
#  '&' 색상 코드 사용 가능
#  {player}, {amount} 등 플레이스홀더 지원
# ═══════════════════════════════════

# 사망 관련
death: "&c아이템 일부가 유실되었습니다. 머리를 찾아 회수하세요."
cooldown: "&7사망 직후에는 머리가 터지지 않습니다."
protection-used: "&b&l[!] &f사망 패널티 방지권&7이 사용되어 아이템이 유실되지 않습니다."

# 머리 회수
retrieve: "&a유실된 아이템을 되찾았습니다!"
expired: "&7이 머리는 이미 부패했습니다."

# 명령어
key-given: "&a{player}에게 머리 열쇠 {amount}개를 지급했습니다."
key-received: "&a머리 열쇠 {amount}개를 받았습니다."
ticket-given: "&a{player}에게 사망 방지권 {amount}개를 지급했습니다."
ticket-received: "&b사망 패널티 방지권 {amount}개를 받았습니다."
no-permission: "&c권한이 없습니다."
player-not-found: "&c플레이어를 찾을 수 없습니다: {player}"
invalid-number: "&c올바른 숫자를 입력하세요."
config-reloaded: "&aDeathHead 설정을 리로드했습니다."

# TextDisplay (머리 위 표시)
# {player} = 플레이어 이름, {time} = 남은 시간
# 줄을 자유롭게 추가/제거할 수 있습니다.
text-display:
  dropped:
    lines:
      - "&c{player}&7의 머리"
      - "&c⏳ {time}"
      - ""
      - "&c부패되기 전에 봉인해제"
    expired-lines:
      - "&c{player}&7의 머리"
      - "&4&l부패 완료"
  placed:
    lines:
      - "&c{player}&7의 머리"
      - "&c⏳ {time}"
    expired-lines:
      - "&c{player}&7의 머리"
      - "&4&l부패 완료"
